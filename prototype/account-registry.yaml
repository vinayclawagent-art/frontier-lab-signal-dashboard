# Frontier Lab Signal Dashboard account registry
# Generated by the X Artifact Factory frequent improver on 2026-06-03.
# Purpose: turn a raw follow-list into a scanable, scoreable input for X-Intel capture.

schema_version: 1
scan_policy:
  default_cadence: daily
  minimum_artifact_score: 7
  capture_limit_per_scan: 7
  route_options:
    - capture_to_x_intel
    - generate_artifact_package
    - add_to_watchlist
    - ignore_for_now
accounts:
  - handle: "@OpenAI"
    lab: OpenAI
    surface: models_and_platform
    priority: high
    best_route: capture_to_x_intel
    signal_rules:
      - new model, capability, pricing, API, agent, eval, or developer-platform release
      - posts that include demos, benchmarks, cookbook links, or system cards
    artifact_hooks:
      - prototype an agent workflow unlocked by the release
      - create an infographic if the release changes model-selection strategy
    last_useful_signal: null

  - handle: "@AnthropicAI"
    lab: Anthropic
    surface: claude_and_agents
    priority: high
    best_route: generate_artifact_package
    signal_rules:
      - Claude Code, MCP, tool-use, computer-use, safety, or context-window updates
      - practical engineering guidance from Anthropic product or research accounts
    artifact_hooks:
      - update Hermes agent workflow notes
      - draft a skill if the post reveals a repeatable Claude/agent procedure
    last_useful_signal: null

  - handle: "@GoogleDeepMind"
    lab: Google DeepMind
    surface: research_and_models
    priority: high
    best_route: capture_to_x_intel
    signal_rules:
      - Gemini, robotics, world-model, Alpha*, or research-paper announcements
      - posts with demos that suggest a new product surface
    artifact_hooks:
      - create frontier-research briefing cards
      - route high visual potential posts to infographic generation
    last_useful_signal: null

  - handle: "@cursor_ai"
    lab: Cursor
    surface: coding_agents
    priority: high
    best_route: generate_artifact_package
    signal_rules:
      - IDE-agent, code-review, background-agent, repo workflow, or eval updates
      - posts showing measurable developer productivity gains
    artifact_hooks:
      - compare against Hermes/Codex/Claude workflows
      - create a prototype workflow board for developer-agent loops
    last_useful_signal: null

  - handle: "@xai"
    lab: xAI
    surface: grok_and_x_native_ai
    priority: medium
    best_route: add_to_watchlist
    signal_rules:
      - Grok model releases, X-native agent features, API updates, or real-time search changes
      - examples where X context becomes a product advantage
    artifact_hooks:
      - test whether X-native signals improve artifact-factory source discovery
      - create a product brief if real-time X search unlocks a workflow
    last_useful_signal: null

  - handle: "@OpenAIDevs"
    lab: OpenAI
    surface: developer_platform
    priority: high
    best_route: capture_to_x_intel
    signal_rules:
      - Codex, API, SDK, cookbook, plugin, app, or developer-workflow launches
      - partner demos that reveal repeatable role-agent templates
    artifact_hooks:
      - prototype role-specific agent workflow packages
      - save plugin launches as vertical-agent templates
    last_useful_signal: "[[../../../Tools/Codex Role Plugins as Vertical Agent Templates|Codex Role Plugins as Vertical Agent Templates]]"

  - handle: "@GoogleAIStudio"
    lab: Google AI
    surface: app_builder_and_managed_agents
    priority: high
    best_route: capture_to_x_intel
    signal_rules:
      - Gemini API, managed agents, Workspace integrations, AI Studio app-builder releases
      - posts with concrete app-building demos or tester/public-sharing changes
    artifact_hooks:
      - create Workspace-agent product briefs
      - prototype Gmail/Sheets/Drive workflow copilots
    last_useful_signal: "[[../../../Techniques/Google AI Studio Managed Agents as Workspace App Pattern|Google AI Studio Managed Agents as Workspace App Pattern]]"

  - handle: "@grok"
    lab: xAI
    surface: grok_product_surface
    priority: medium
    best_route: add_to_watchlist
    signal_rules:
      - Grok Build, Notion, X-native search, model, or productivity-surface launches
      - examples where real-time X context improves an agent workflow
    artifact_hooks:
      - compare Grok Build against Hermes/Codex/Claude agent UX
      - save useful inspectability/background-task patterns
    last_useful_signal: "[[../../../Tools/Grok Build Composer 2.5 as Long-Running Agent Alternative|Grok Build Composer 2.5 as Long-Running Agent Alternative]]"

scoring_rubric:
  artifact_score_9_10: "Immediate prototype + infographic + skill candidate."
  artifact_score_7_8: "One main artifact plus improvement loop update."
  artifact_score_5_6: "Brief only; revisit if related signals converge."
  artifact_score_1_4: "Ignore or keep as raw note."
